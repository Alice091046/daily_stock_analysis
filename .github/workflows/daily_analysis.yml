name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建目录
        run: |
          mkdir -p data logs reports

      - name: 执行分析并微信推送
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.aihubmix.com/v1
          OPENAI_MODEL: gpt-3.5-turbo

          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          STOCK_LIST: "600903.SH,002506.SZ,301519.SZ,600256.SH,603324.SH,600900.SH,601088.SH,601899.SH"
          LOG_LEVEL: INFO

        run: |
          python main.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: |
            reports/
            logs/
          retention-days: 30
